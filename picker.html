<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pick from Google Drive</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #fff;
      color: #333;
    }
    #status {
      text-align: center;
      font-size: 15px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e0e0e0;
      border-top-color: #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      display: none;
      color: #c62828;
      background: #ffebee;
      padding: 12px 16px;
      border-radius: 6px;
      max-width: 400px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">
    <div class="spinner"></div>
    Loading Drive picker...
  </div>
  <div id="error"></div>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="picker.js"></script>
</body>
</html>
